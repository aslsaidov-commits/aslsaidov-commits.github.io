<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мониторинг социокультурной адаптации</title>
    <style>
        /* Подключаем современный шрифт Montserrat */
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap');

        :root {
            /* Фирменные цвета со скриншота */
            --primary-color: #5145fe; /* Сине-фиолетовый (индиго) */
            --primary-hover: #3d34bf; /* Темный индиго для наведения */
            --secondary-color: #55b7b1; /* Бирюзовый акцентный цвет */
            --bg-color: #f8f9fc; /* Очень светлый серо-синий фон страницы */
            --card-bg: #ffffff;
            --text-color: #333333;
            --border-color: #d1d5db;
        }

        body { 
            font-family: 'Montserrat', sans-serif; 
            background-color: var(--bg-color); 
            color: var(--text-color); 
            line-height: 1.6; 
            padding: 15px; 
            transition: all 0.3s; 
        }

        .container { 
            max-width: 800px; 
            margin: 0 auto; 
            background: var(--card-bg); 
            padding: 30px; 
            border-radius: 12px; /* Чуть более скругленные углы */
            box-shadow: 0 8px 25px rgba(81, 69, 254, 0.1); /* Тень в тон фирменного цвета */
        }
        
        /* Поддержка письма справа налево для арабского */
        body.rtl { direction: rtl; text-align: right; }
        body.rtl .radio-group label { text-align: right; }
        
        /* ИСПРАВЛЕНИЕ: Автоматический перенос длинных заголовков для мобильных */
        h1, h2, h3 { 
            text-align: center; 
            color: var(--primary-color); 
            overflow-wrap: break-word; /* Жестко переносить длинные слова */
            word-wrap: break-word; 
            hyphens: auto; 
        }

        .instructions { 
            background: #f0f4f8; 
            padding: 15px; 
            border-radius: 8px; 
            margin-bottom: 20px; 
            font-size: 0.95em; 
            border-left: 4px solid var(--secondary-color); /* Бирюзовый акцент */
        }
        body.rtl .instructions { border-left: none; border-right: 4px solid var(--secondary-color); }

        .form-group { margin-bottom: 20px; }
        label { display: block; font-weight: 600; margin-bottom: 8px; }
        
        input[type="text"], input[type="number"], textarea, select { 
            width: 100%; 
            padding: 12px; 
            border: 1px solid var(--border-color); 
            border-radius: 6px; 
            box-sizing: border-box; 
            font-family: inherit; 
            font-size: 16px; 
            background-color: #fff;
            transition: border-color 0.2s;
        }
        
        input[type="text"]:focus, input[type="number"]:focus, textarea:focus, select:focus {
            border-color: var(--primary-color); /* Фирменный цвет рамки при клике */
            outline: none;
        }
        
        .question { margin-bottom: 25px; padding-bottom: 15px; border-bottom: 1px solid #f0f0f0; }
        .question p { font-weight: 600; margin-bottom: 10px; color: #1a1a1a; }
        
        .radio-group { display: flex; flex-direction: column; gap: 8px; }
        .radio-group label { 
            font-weight: normal; cursor: pointer; display: flex; align-items: center; gap: 10px; 
            background: #fcfcfd; padding: 12px; border-radius: 8px; 
            border: 1px solid var(--border-color); transition: 0.2s; margin-bottom: 0; 
        }
        .radio-group label:hover { background: #f0f4fc; border-color: #b0b8d6; }
        .radio-group input[type="radio"], .radio-group input[type="checkbox"] { 
            margin: 0; width: 18px; height: 18px; accent-color: var(--primary-color); 
        }

        .lang-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .lang-btn { 
            background: #fff; border: 2px solid var(--primary-color); color: var(--primary-color); 
            font-size: 18px; font-weight: 600; border-radius: 8px;
        }
        .lang-btn:hover { background: var(--primary-color); color: #fff; }

        button { 
            background-color: var(--primary-color); color: white; border: none; padding: 14px 20px; 
            cursor: pointer; border-radius: 8px; font-size: 16px; width: 100%; margin-top: 20px; 
            transition: 0.3s; font-weight: 600; 
        }
        button:hover { background-color: var(--primary-hover); }
        button:disabled { background-color: #a0a0a0; cursor: not-allowed; }
        
        .hidden { display: none !important; }
        #loading { text-align: center; font-weight: 600; color: var(--primary-color); margin-top: 20px; }
        
        .nav-buttons { display: flex; gap: 10px; }
        .btn-secondary { background-color: #7a8290; }
        .btn-secondary:hover { background-color: #616875; }

        /* ИСПРАВЛЕНИЕ: Адаптивность элементов под экраны телефонов */
        @media (max-width: 600px) {
            h1 { font-size: 1.4rem; }
            h2 { font-size: 1.2rem; }
            h3 { font-size: 1.1rem; }
            .container { padding: 20px; }
            .lang-btn { font-size: 16px; }
        }
    </style>
</head>

            { ru: "27. Я могу открыто обсуждать проблемы в вузе.", en: "27. I can openly discuss problems in uni.", fr: "27. Je peux discuter ouvertement des problèmes à l'uni.", ar: "27. أستطيع مناقشة المشاكل بصراحة في الجامعة." },
            { ru: "28. Пропаганда ненависти — это преступление.", en: "28. Hate speech is a crime.", fr: "28. Le discours de haine est un crime.", ar: "28. الترويج للكراهية جريمة." }
        ].map((qObj, i) => ({
            id: `q${22+i}`, block: 3, type: "likert", q: qObj
        })),

        { id: "q29", block: 3, type: "radio", q: { ru: "29. Встречали ли Вы попытки вовлечения в радикальные группы?", en: "29. Encountered recruitment into radical groups?", fr: "29. Rencontré un recrutement dans des groupes radicaux?", ar: "29. هل واجهت محاولات تجنيد في جماعات متطرفة؟" }, opts: {
            ru: ["Да, лично", "Слышал от знакомых", "Нет", "Затрудняюсь"],
            en: ["Yes, personally", "Heard from friends", "No", "Hard to answer"],
            fr: ["Oui, personnellement", "Entendu par des amis", "Non", "Difficile à dire"],
            ar: ["نعم، شخصيا", "سمعت من أصدقاء", "لا", "يصعب الإجابة"]
        }},
        { id: "q30", block: 3, type: "radio", q: { ru: "30. Как Вы поступите при попытке вовлечения?", en: "30. What will you do if recruited?", fr: "30. Que ferez-vous en cas de recrutement?", ar: "30. ماذا ستفعل إذا حاول أحدهم تجنيدك؟" }, opts: {
            ru: ["Обращусь в правоохранительные органы", "К руководству вуза", "В посольство", "Расскажу друзьям", "Проигнорирую", "Затрудняюсь"],
            en: ["Contact police", "Uni administration", "Embassy", "Tell friends", "Ignore", "Hard to answer"],
            fr: ["Contacter la police", "Administration", "Ambassade", "Dire aux amis", "Ignorer", "Difficile à dire"],
            ar: ["الاتصال بالشرطة", "إدارة الجامعة", "السفارة", "إخبار الأصدقاء", "تجاهل", "يصعب الإجابة"]
        }},
        { id: "q31", block: 3, type: "radio", q: { ru: "31. Чувствуете ли Вы себя в безопасности?", en: "31. Do you feel safe?", fr: "31. Vous sentez-vous en sécurité?", ar: "31. هل تشعر بالأمان؟" }, opts: {
            ru: ["Да, полностью", "Скорее да", "Скорее нет", "Нет", "Затрудняюсь"],
            en: ["Yes, completely", "Somewhat", "Somewhat no", "No", "Hard to answer"],
            fr: ["Oui, complètement", "Plutôt", "Plutôt non", "Non", "Difficile à dire"],
            ar: ["نعم، تماما", "نوعا ما", "نوعا ما لا", "لا", "يصعب الإجابة"]
        }},
        { id: "q32", block: 3, type: "checkbox", hasOther: true, q: { ru: "32. Меры для улучшения адаптации (до 3 вариантов):", en: "32. Measures to improve adaptation (up to 3):", fr: "32. Mesures d'amélioration (jusqu'à 3):", ar: "32. تدابير لتحسين التكيف (حتى 3):" }, opts: {
            ru: ["Программы поддержки", "Улучшение бытовых условий", "Кураторы-студенты", "Встречи с администрацией", "Мероприятия", "Правовое просвещение", "Психологическая поддержка", "Улучшение преподавания языка"],
            en: ["Support programs", "Better living conditions", "Student mentors", "Meetings with administration", "Events", "Legal education", "Psychological support", "Better language teaching"],
            fr: ["Programmes de soutien", "Meilleures conditions de vie", "Mentors étudiants", "Réunions avec l'admin", "Événements", "Éducation juridique", "Soutien psychologique", "Meilleur enseignement de la langue"],
            ar: ["برامج الدعم", "تحسين ظروف المعيشة", "موجهون طلابيون", "لقاءات مع الإدارة", "فعاليات", "تثقيف قانوني", "دعم نفسي", "تحسين تعليم اللغة"]
        }},
        { id: "q33", block: 3, type: "textarea", q: { ru: "33. Ваши пожелания и комментарии:", en: "33. Comments / Suggestions:", fr: "33. Commentaires / Suggestions:", ar: "33. تعليقات / اقتراحات:" } }
    ];

    // --- STATE ---
    let currentLang = 'ru';
    let currentBlock = 0;
    const totalBlocks = 4;
    let answers = {};

    function selectLanguage(lang) {
        currentLang = lang;
        if (lang === 'ar') {
            document.body.classList.add('rtl');
        } else {
            document.body.classList.remove('rtl');
        }
        
        const dict = i18n[lang];
        document.getElementById('t-main-title').innerText = dict.title;
        document.getElementById('t-intro-text').innerText = dict.intro;
        document.getElementById('btn-start').innerText = dict.btnStart;
        document.getElementById('btn-prev').innerText = dict.btnPrev;
        document.getElementById('btn-next').innerText = dict.btnNext;
        document.getElementById('t-final-title').innerText = dict.finalTitle;
        document.getElementById('t-final-text').innerText = dict.finalText;

        document.getElementById('step-lang').classList.add('hidden');
        document.getElementById('step-intro').classList.remove('hidden');
    }

    function startSurvey() {
        document.getElementById('step-intro').classList.add('hidden');
        document.getElementById('step-survey').classList.remove('hidden');
        renderBlock();
    }

    function renderBlock() {
        const dict = i18n[currentLang];
        document.getElementById('block-title').innerText = dict.blocks[currentBlock];
        
        const container = document.getElementById('survey-container');
        container.innerHTML = ''; // Очистка

        if (currentBlock === 3) { // Инструкция для шкалы Лайкерта в 4 блоке
            container.innerHTML += `<div class="instructions">${dict.likertScale}</div>`;
        }

        const blockQuestions = questionsDB.filter(q => q.block === currentBlock);

        blockQuestions.forEach(q => {
            let html = `<div class="question" id="wrap_${q.id}">
                <p>${q.q[currentLang]}</p>`;
            
            // Отрисовка элементов в зависимости от типа вопроса
            if (q.type === "text" || q.type === "number") {
                html += `<input type="${q.type}" name="${q.id}" id="${q.id}">`;
            } else if (q.type === "select") {
                html += `<select name="${q.id}" id="${q.id}">`;
                q.opts[currentLang].forEach((opt, idx) => {
                    const val = idx === 0 ? "" : opt; // Первый элемент — пустая заглушка "Выберите страну..."
                    html += `<option value="${val}">${opt}</option>`;
                });
                html += `</select>`;
            } else if (q.type === "textarea") {
                html += `<textarea name="${q.id}" id="${q.id}" rows="4"></textarea>`;
            } else if (q.type === "radio" || q.type === "checkbox") {
                html += `<div class="radio-group">`;
                q.opts[currentLang].forEach((opt, idx) => {
                    html += `<label><input type="${q.type}" name="${q.id}" value="${idx+1}"> ${opt}</label>`;
                });
                if (q.hasOther) {
                    html += `<label><input type="${q.type}" name="${q.id}" value="other" id="check_other_${q.id}"> ${dict.otherSpecify} <input type="text" id="text_other_${q.id}" style="width: auto; flex-grow: 1; padding: 5px;"></label>`;
                }
                html += `</div>`;
            } else if (q.type === "likert") {
                html += `<div class="radio-group" style="flex-direction: row; flex-wrap: wrap;">`;
                for(let i=1; i<=5; i++) {
                    html += `<label style="flex: 1; justify-content: center;"><input type="radio" name="${q.id}" value="${i}"> ${i}</label>`;
                }
                html += `</div>`;
            }

            html += `</div>`;
            container.innerHTML += html;
        });

        // Восстановление ответов, если пользователь нажал кнопку "Назад"
        blockQuestions.forEach(q => {
            if (answers[q.id]) {
                if (q.type === "text" || q.type === "number" || q.type === "textarea" || q.type === "select") {
                    const el = document.getElementById(q.id);
                    if(el) el.value = answers[q.id];
                } else if (q.type === "radio" || q.type === "likert") {
                    const el = document.querySelector(`input[name="${q.id}"][value="${answers[q.id].val}"]`);
                    if(el) el.checked = true;
                    if(answers[q.id].val === 'other') {
                        document.getElementById(`text_other_${q.id}`).value = answers[q.id].text;
                    }
                } else if (q.type === "checkbox") {
                    answers[q.id].vals.forEach(v => {
                        const el = document.querySelector(`input[name="${q.id}"][value="${v}"]`);
                        if(el) el.checked = true;
                    });
                    if(answers[q.id].text) {
                        document.getElementById(`text_other_${q.id}`).value = answers[q.id].text;
                    }
                }
            }
        });

        document.getElementById('btn-prev').classList.toggle('hidden', currentBlock === 0);
        document.getElementById('btn-next').innerText = (currentBlock === totalBlocks - 1) ? dict.btnSubmit : dict.btnNext;
        window.scrollTo(0, 0);
    }

    function saveCurrentBlock() {
        const blockQuestions = questionsDB.filter(q => q.block === currentBlock);
        let allValid = true;

        blockQuestions.forEach(q => {
            if (q.type === "text" || q.type === "number" || q.type === "textarea" || q.type === "select") {
                const val = document.getElementById(q.id).value.trim();
                // Делаем обязательными все поля, кроме большого комментария в конце (q33)
                if (q.type !== "textarea" && !val) allValid = false; 
                answers[q.id] = val;
            } else if (q.type === "radio" || q.type === "likert") {
                const checked = document.querySelector(`input[name="${q.id}"]:checked`);
                if (!checked) allValid = false;
                else {
                    let ans = { val: checked.value };
                    if (checked.value === 'other') ans.text = document.getElementById(`text_other_${q.id}`).value;
                    answers[q.id] = ans;
                }
            } else if (q.type === "checkbox") {
                const checked = document.querySelectorAll(`input[name="${q.id}"]:checked`);
                if (checked.length === 0) allValid = false;
                else {
                    let ans = { vals: Array.from(checked).map(c => c.value) };
                    const otherCheck = document.getElementById(`check_other_${q.id}`);
                    if (otherCheck && otherCheck.checked) ans.text = document.getElementById(`text_other_${q.id}`).value;
                    answers[q.id] = ans;
                }
            }
        });

        if (!allValid) {
            alert(i18n[currentLang].errorRequired);
            return false;
        }
        return true;
    }

    function prevBlock() {
        saveCurrentBlock();
        if (currentBlock > 0) {
            currentBlock--;
            renderBlock();
        }
    }

    function nextBlock() {
        if (!saveCurrentBlock()) return;

        if (currentBlock < totalBlocks - 1) {
            currentBlock++;
            renderBlock();
        } else {
            submitForm();
        }
    }

    function submitForm() {
        document.getElementById('btn-next').disabled = true;
        document.getElementById('btn-prev').disabled = true;
        document.getElementById('loading').innerText = i18n[currentLang].loading;
        document.getElementById('loading').classList.remove('hidden');

        // Подготовка данных для отправки
        const formData = new URLSearchParams();
        formData.append('lang', currentLang);
        
        for (let key in answers) {
            let val = answers[key];
            if (typeof val === 'object') {
                if (val.vals) val = val.vals.join(',') + (val.text ? ` (${val.text})` : '');
                else val = val.val === 'other' ? `Other (${val.text})` : val.val;
            }
            formData.append(key, val);
        }

        fetch(scriptURL, { method: 'POST', body: formData })
            .then(response => {
                document.getElementById('step-survey').classList.add('hidden');
                document.getElementById('step-final').classList.remove('hidden');
            })
            .catch(error => {
                alert('Connection error. Try again.');
                document.getElementById('btn-next').disabled = false;
                document.getElementById('btn-prev').disabled = false;
                document.getElementById('loading').classList.add('hidden');
            });
    }
</script>
